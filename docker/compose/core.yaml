version: '3'
services:
  traefik:
    environment:
      - EMAIL
      - DOMAIN
      - TRAEFIK_USER
      - TRAEFIK_PASS_HASH
      - CLOUDFLARE_DNS_API_TOKEN
    image: traefik:3
    container_name: traefik
    networks:
      vlan-private:
        ipv4_address: 192.168.1.2
      vlan-iot:
      vlan-downloads:
      vlan-cameras:
    ports:
      - "192.168.1.2:80:80"     # For Let's Encrypt only
      - "192.168.1.2:443:443"   # HTTPS
      - "192.168.1.2:8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/appdata/traefik:/etc/traefik
    command:
      - "--ping=true"
      - "--ping.entrypoint=ping"
      # API and Dashboard 
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints
      - "--entrypoints.web.address=192.168.1.2:80"
      - "--entrypoints.websecure.address=192.168.1.2:443"
      # HTTPS Redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      #- "--serversTransport.insecureSkipVerify=true" #set to true if having ssl issues
      # DNS Challenge config
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.email=${EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      #traefik logs
      - "--log.level="  # Set to INFO in production
      - "--log.filePath=/etc/traefik/traefik.log"
      - "--accesslog=true"
      - "--accesslog.filepath=/etc/traefik/access.log"
      # Security
      #- "--global.sendAnonymousUsage=false"
      #tls handeling
      - "--providers.docker.network=vlan-private"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=30"
    labels:
      - "traefik.enable=true"
     # Security middlewares
      - "traefik.http.middlewares.ipwhitelist.ipwhitelist.sourcerange=192.168.1.0/24"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_USER}:${TRAEFIK_PASS_HASH}"
      #floc/ech prevention headers
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Permissions-Policy=interest-cohort=()"
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Alt-Svc=h3=\":443\"; ma=86400"
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Strict-Transport-Security=max-age=31536000; includeSubDomains"
      # Dashboard routing
      - "traefik.http.routers.dashboard.middlewares=ipwhitelist,auth,security-headers"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
    logging: #docker logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
#      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/api/version"]
#      interval: 20s
#      timeout: 5s
#      retries: 10
#      start_period: 60s

networks:
  vlan-private:    # alias network
    external: true
    name: br0

  vlan-public:
    name: vlan-public
    driver: macvlan
    driver_opts:
      parent: br0.20
    ipam:
      config:
        - subnet: 192.168.20.0/24
          gateway: 192.168.20.1

  vlan-iot:
    name: vlan-iot
    driver: macvlan
    driver_opts:
      parent: br0.40
    ipam:
      config:
        - subnet: 192.168.40.0/24
          gateway: 192.168.40.1

  vlan-downloads:
    name: vlan-downloads
    driver: macvlan
    driver_opts:
      parent: br0.60
    ipam:
      config:
        - subnet: 192.168.60.0/24
          gateway: 192.168.60.1

  vlan-cameras:
    name: vlan-cameras
    driver: macvlan
    driver_opts:
      parent: br0.70
    ipam:
      config:
        - subnet: 192.168.70.0/24
          gateway: 192.168.70.1
