version: '3'
services:
  traefik:
    image: traefik:3
    container_name: traefik
    networks:
      vlan-private:
        ipv4_address: 192.168.1.2
    ports:
      - "192.168.1.2:80:80"
      - "192.168.1.2:443:443"
      - "192.168.1.2:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/appdata/traefik:/etc/traefik
    command:
      - "--api.dashboard=true"          # Enables both API and dashboard
      - "--api.insecure=false"          # Disable insecure access
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=192.168.1.2:80"
      - "--entrypoints.websecure.address=192.168.1.2:443"
    labels:
      - "traefik.enable=true"
      # Route for dashboard/api
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"
      # IP whitelist for security
      - "traefik.http.middlewares.ipwhitelist.ipwhitelist.sourcerange=192.168.1.0/24"
      - "traefik.http.routers.traefik.middlewares=ipwhitelist"
    restart: unless-stopped

networks:
  vlan-private:
    external: true
    name: br0