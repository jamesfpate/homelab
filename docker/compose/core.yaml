version: '3'
services:
  traefik:
    image: traefik:3
    container_name: traefik
    networks:
      vlan-private:
        ipv4_address: 192.168.1.2
    ports:
      - "192.168.1.2:80:80"
      - "192.168.1.2:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.insecure=false"  # Change back to secure
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
    labels:
      - "traefik.enable=true"
      # Basic security
      #- "traefik.http.middlewares.ipwhitelist.ipwhitelist.sourcerange=192.168.1.0/24"
      #- "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_USER}:${TRAEFIK_PASS_HASH}"
      # Dashboard routing
      #- "traefik.http.routers.dashboard.rule=Host(`192.168.1.2`) || Host(`traefik.local`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=web"j
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"  # Add this back
      #- "traefik.http.routers.dashboard.middlewares=ipwhitelist"
    restart: unless-stopped

networks:
  vlan-private:
    external: true
    name: br0