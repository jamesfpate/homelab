version: "3.3"
networks:
  vlan-private:
    external: true
    name: br0

services:
  traefik:
    environment:
      - EMAIL
      - DOMAIN
      - TRAEFIK_USER
      - TRAEFIK_PASS_HASH
      - CLOUDFLARE_DNS_API_TOKEN
    image: traefik:3
    container_name: traefik-internal
    networks:
      vlan-private:
        ipv4_address: 192.168.1.2
    ports:
      - "80:80" 
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/appdata/traefik:/etc/traefik
    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --log.level=DEBUG
      - --api.insecure=true
    labels:
      - "traefik.enable=true"
     # Security middlewares
      - "traefik.http.middlewares.ipwhitelist.ipwhitelist.sourcerange=192.168.1.0/24"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=false"  # Just this one
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_USER}:${TRAEFIK_PASS_HASH}"
      # Traefik Dashboard
      - "traefik.http.routers.traefik-dashboard.entrypoints=web,websecure"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.services.traefik-dashboard-service.loadbalancer.server.port=8080"
    restart: unless-stopped

#https://www.simplehomelab.com/traefik-v3-docker-compose-guide-2024/
