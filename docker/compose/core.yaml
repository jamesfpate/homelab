version: '3'
services:
  traefik:
    environment:
      - EMAIL
      - DOMAIN
      - TRAEFIK_USER
      - TRAEFIK_PASS_HASH
      - CLOUDFLARE_DNS_API_TOKEN
    image: traefik:3
    container_name: traefik
    networks:
      vlan-private:
        ipv4_address: 192.168.1.2
      vlan-iot:
      vlan-downloads:
      vlan-cameras:
    ports:
      - "192.168.1.2:80:80"     # For Let's Encrypt only
      - "192.168.1.2:8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/appdata/traefik:/etc/traefik
    command:
      # 1. Entrypoints 
      - "--entrypoints.web.address=192.168.1.2:80"
      # 2. Core features/providers
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=vlan-private"
      # 6. Logging 
      - "--log.level="
      - "--log.filePath=/etc/traefik/traefik.log"
      - "--accesslog=true"
      - "--accesslog.filepath=/etc/traefik/access.log"
    labels:
      - "traefik.enable=true"
     # Security middlewares
      - "traefik.http.middlewares.ipwhitelist.ipwhitelist.sourcerange=192.168.1.0/24"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=false"  # Just this one
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_USER}:${TRAEFIK_PASS_HASH}"
      # Dashboard routing
      - "traefik.http.routers.dashboard.middlewares=ipwhitelist,auth,security-headers"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.local`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
    logging: #docker logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
    restart: unless-stopped

networks:
  vlan-private:    # alias network
    external: true
    name: br0

  vlan-public:
    name: vlan-public
    driver: macvlan
    driver_opts:
      parent: br0.20
    ipam:
      config:
        - subnet: 192.168.20.0/24
          gateway: 192.168.20.1

  vlan-iot:
    name: vlan-iot
    driver: macvlan
    driver_opts:
      parent: br0.40
    ipam:
      config:
        - subnet: 192.168.40.0/24
          gateway: 192.168.40.1

  vlan-downloads:
    name: vlan-downloads
    driver: macvlan
    driver_opts:
      parent: br0.60
    ipam:
      config:
        - subnet: 192.168.60.0/24
          gateway: 192.168.60.1

  vlan-cameras:
    name: vlan-cameras
    driver: macvlan
    driver_opts:
      parent: br0.70
    ipam:
      config:
        - subnet: 192.168.70.0/24
          gateway: 192.168.70.1
