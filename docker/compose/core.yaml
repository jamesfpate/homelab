version: '3'
services:
  traefik:
    image: traefik:3
    container_name: traefik
    networks:
      vlan-private:
        ipv4_address: 192.168.1.2
    ports:
      - "192.168.1.2:80:80"
      - "192.168.1.2:443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/appdata/traefik:/etc/traefik
    command:
      - "--api=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Bind entrypoints explicitly to container IP
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Certificate resolver
      - "--certificatesresolvers.letsencrypt.acme.email=${EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Add debug logging temporarily
      - "--log.level=DEBUG"
    labels:
      - "traefik.enable=true"
      # Dashboard routing with HTTPS
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"  # Specify the port
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      # Security middlewares
      - "traefik.http.middlewares.ipwhitelist.ipwhitelist.sourcerange=192.168.1.0/24"
      - "traefik.http.routers.dashboard.middlewares=ipwhitelist,auth"
    restart: unless-stopped

networks:
  vlan-private:
    external: true
    name: br0